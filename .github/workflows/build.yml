name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21', '25']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build & test
        working-directory: jmeter-plugin
        run: mvn -B test

      - name: Package fat JAR
        working-directory: jmeter-plugin
        run: mvn -B package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: mock-jutsu-jmeter-java${{ matrix.java }}
          path: jmeter-plugin/target/mock-jutsu-jmeter-*.jar
